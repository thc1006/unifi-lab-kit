# mllab-network inventory template.
#
# Copy to inventory/hosts.yml and fill in real values. hosts.yml is gitignored;
# hosts.example.yml is the committed structure reference.
#
# Tools read this file via src/mllab_net/config.py.

gateway:
  # USG WAN-side (public)
  wan_ip: "REPLACE_ME_WAN_IP"
  wan_gateway: "REPLACE_ME_WAN_GATEWAY"
  wan_netmask: "255.255.255.0"
  wan_alias: "REPLACE_ME_WAN_ALIAS_OR_NULL"
  # USG LAN-side
  lan_ip: "192.168.1.1"
  lan_subnet: "192.168.1.0/24"
  # MAC (needed for Controller adopt / force-provision API)
  mac: "aa:bb:cc:dd:ee:ff"

controller:
  # Where the UniFi Controller actually runs (Docker on NAS in the reference lab)
  host: "192.168.1.129"
  https_port: 8443
  inform_port: 8080
  docker_container: "unifi"

nas:
  ip: "192.168.1.129"
  # Secondary "public" IP assigned via WAN alias, if you run services on it
  wan_alias_ip: "REPLACE_ME_WAN_ALIAS_OR_NULL"
  # External SSH port (port-forwarded from WAN_IP:<port> to NAS:22)
  external_ssh_port: 12990

# Servers that are online and managed.
# external_port convention: 12 + last two digits of internal_ip.
servers:
  - name: server06
    internal_ip: "192.168.1.106"
    external_port: 12060
    mac: "REPLACE_ME"
    user_profile: primary         # uses SERVER_PRIMARY_USER from .env
    cpu: "i7-7700"
    ram_gb: 64
    gpu: "RTX 3090 24G"
    ip_mode: dhcp_reservation     # one of: dhcp_reservation, static_netplan, static_nmcli

