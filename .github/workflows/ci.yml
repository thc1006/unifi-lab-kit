name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref (PR or branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Pytest
        run: pytest -q

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + type stubs
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" types-paramiko types-PyYAML types-requests

      - name: Mypy
        run: mypy

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck

      - name: Run shellcheck on scripts/
        run: shellcheck scripts/*.sh

  secret-regression:
    name: secret-regression-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regression scan
        run: bash .github/scripts/secret_regression_scan.sh

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks scans history, so we need it
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GL_VERSION=8.24.2
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        # --redact so the diff in job output does not itself print secrets
        # --no-banner for quieter CI logs
        # Scan the current commit only; history already redacted in the
        # initial open-source commit.
        run: gitleaks detect --source . --redact --no-banner --verbose
